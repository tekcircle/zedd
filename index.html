<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zedd POCs — Circle24</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #fff;
        }
        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }
        .poc-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .poc-btn {
            display: block;
            padding: 20px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 17px;
            font-weight: 700;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s;
            color: inherit;
            border: none;
            cursor: pointer;
        }
        .poc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        }
        .poc-btn.homepage {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }
        .poc-btn.create-request {
            background: linear-gradient(135deg, #00C896 0%, #059669 100%);
            color: #0A0A0A;
            box-shadow: 0 8px 24px rgba(0, 200, 150, 0.35);
        }
        .poc-btn .label {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 500;
            margin-top: 4px;
        }
        .poc-btn.create-request .label {
            color: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Asynchronous request flow POC</h1>
        <p class="subtitle">Proof of concepts for Circle24</p>

        <div class="poc-buttons">
            <a href="homepage.html" class="poc-btn homepage">
                Enhanced Homepage
                <div class="label">Browse providers, categories & trending services</div>
            </a>
            <a href="create_request.html" class="poc-btn create-request">
                Create Request / Needs Feed
                <div class="label">Client & provider views — post needs, send offers</div>
            </a>
        </div>
    </div>
</body>
</html>
